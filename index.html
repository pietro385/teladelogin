<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="bg-dark">

    <main class="d-flex align-items-center justify-content-center vh-100">
        <section id="login-container" class="container">
            <div class="row g-0 shadow-lg rounded-4 overflow-hidden bg-white">
                
                <div class="col-md-6 p-5 d-flex flex-column justify-content-center">
                    <h1 class="fw-bold">Login</h1>
                    <p class="text-secondary mb-4">Seja bem-vindo(a) novamente. Faça seu login para acessar sua conta.</p>
                    
                    <form action="login.js" method="post">
                        <div class="input-group mb-3 border rounded-2 p-1 align-items-center">
                            <span class="material-symbols-outlined px-2 text-secondary">person</span>
                            <div class="form-floating flex-grow-1">
                                <input type="email" class="form-control border-0 shadow-none" id="ilogin" placeholder="Seu e-mail">
                                <label for="ilogin">Seu e-mail</label>
                            </div>
                            <span class="text-secondary pe-2 small">Login</span>
                        </div>

                        <div class="input-group mb-4 border rounded-2 p-1 align-items-center">
                            <span class="material-symbols-outlined px-2 text-secondary">key</span>
                            <div class="form-floating flex-grow-1">
                                <input type="password" class="form-control border-0 shadow-none" id="isenha" placeholder="Sua senha">
                                <label for="isenha">Sua senha</label>
                            </div>
                            <span class="text-secondary pe-2 small">Senha</span>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg custom-btn">Entrar</button>
                            <a href="esqueci.html" class="btn btn-outline-primary custom-btn">Esqueci minha senha</a>
                        </div>
                    </form>
                </div>

                <div id="imagem" class="col-md-6 d-none d-md-block" 
                     style="background: url('metal.jpg') center center / cover no-repeat;">
                </div>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
